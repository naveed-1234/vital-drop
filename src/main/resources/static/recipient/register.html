<!DOCTYPE html>
<html>
<head>
    <title>Recipient Registration</title>

    <link rel="stylesheet" href="../css/recipient.css">

    <script src="../js/recipient.js"></script>
</head>

<body class="auth-page">

<div class="form-container">

    <h2>Recipient Registration</h2>

    <form id="registerForm">

        <input type="text"
               id="fullName"
               placeholder="Full Name"
               required>

        <input type="email"
               id="email"
               placeholder="Email"
               required>

        <button type="button"
                class="secondary-btn"
                onclick="sendOtp()">
            Send OTP
        </button>

        <input type="text"
               id="otp"
               placeholder="Enter OTP">

        <button id="verifyBtn" type="button"
                class="success-btn"
                onclick="verifyOtp()">
            Verify OTP
        </button>

        <p id="verificationStatus"></p>

        <input type="password"
               id="password"
               placeholder="Password"
               required>

        <input type="text"
               id="phone"
               placeholder="Phone Number">

        <input type="text"
               id="bloodGroupNeeded"
               placeholder="Blood Group Needed"
               required>

        <input type="text"
               id="city"
               placeholder="City">

        <button type="button"
                id="registerBtn"
                class="primary-btn"
                onclick="registerRecipient()"
                disabled>
            Register
        </button>

    </form>

    <p>
        Already have an account?

        <a href="login.html">
            Login
        </a>
    </p>

</div>

</body>
<footer class="landing-footer">
    <p>&copy; 2026 Vital Drop Organization. Secure Industry Node. All Rights Reserved.</p>
</footer>
</html>
