<!DOCTYPE html>
<html>
<head>
    <title>Recipient Login</title>

    <link rel="stylesheet" href="../css/recipient.css">

    <script src="../js/recipient.js"></script>
</head>

<body class="auth-page">

<div class="form-container">

    <h2>Recipient Login</h2>

    <form>

        <input
                type="email"
                id="email"
                placeholder="Email"
                required>

        <input
                type="password"
                id="password"
                placeholder="Password"
                required>

        <button
                type="button" class="primary-btn"
                onclick="loginRecipient()">
            Login
        </button>
    </form>
    <p id="loginStatus"></p>

    <p>
        Don't have an account?

        <a href="register.html">
            Register
        </a>
    </p>
        <br>
        <p>
            <a href="forgot-password.html">
                Forgot Password?
            </a>
        </p>

</div>

</body>
<footer class="landing-footer">
    <p>&copy; 2026 Vital Drop Organization. Secure Industry Node. All Rights Reserved.</p>
</footer>
</html>
