<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Forgot Password</title>

    <<link rel="stylesheet" href="../css/recipient.css">

</head>

<body class="auth-page">

<div class="form-container">

    <h2>Reset Password</h2>

    <input
            type="email"
            id="email"
            placeholder="Enter Registered Email">

    <br><br>

    <button class="secondary-btn" onclick="sendOtp()">
        Send OTP
    </button>

    <br><br>

    <input
            type="text"
            id="otp"
            placeholder="Enter OTP">

    <br><br>

    <button class="success-btn" onclick="verifyOtp()">
        Verify OTP
    </button>

    <p id="verificationStatus"></p>

    <br>

    <input
            type="password"
            id="newPassword"
            placeholder="Enter New Password">

    <br><br>

    <button
            id="resetBtn"
            onclick="resetPassword()"
            disabled>

        Reset Password

    </button>

</div>

<script src="../js/recipient.js"></script>

</body>
<footer class="landing-footer">
    <p>&copy; 2026 Vital Drop Organization. Secure Industry Node. All Rights Reserved.</p>
</footer>
</html>
